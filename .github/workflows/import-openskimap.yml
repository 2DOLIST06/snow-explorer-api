name: Import OpenSkiMap

on:
  workflow_dispatch:
  schedule:
    # hiver : tous les lundis à 03:00 UTC
    - cron: "0 3 * 12,1,2,3 * 1"
    # été : le 1er de chaque mois à 03:00 UTC
    - cron: "0 3 1 4,5,6,7,8,9,10,11 *"

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Run scan
        run: node scripts/scan-openskimap.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run import
        run: node scripts/import-openskimap-all.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openskimap-report
          path: |
            openskimap-match-report.json
            *.json
          if-no-files-found: ignore
